<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odoo App Revamp Preview</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Inter", "Segoe UI", system-ui, sans-serif;
      color: #dbe8ff;
      background: radial-gradient(circle at 20% 10%, #1e345d 0%, #0d1a33 35%, #070f20 100%);
    }
    .preview-toolbar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      border-radius: 999px;
      background: rgba(6, 12, 24, 0.72);
      backdrop-filter: blur(10px);
    }
    .preview-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 999px;
      text-decoration: none;
      color: #cfe5ff;
      border: 1px solid transparent;
      background: rgba(15, 25, 46, 0.62);
    }
    .preview-chip.active {
      color: #fff;
      border-color: rgba(67, 97, 238, 0.52);
      background: rgba(44, 74, 182, 0.52);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.22);
    }
    #preview-app { min-height: 100vh; }
  </style>

  <script src="https://cdn.jsdelivr.net/gh/exis9/squery@latest/squery.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>

<body>
  <div class="preview-toolbar" id="preview-toolbar"></div>
  <div id="preview-app"></div>

  <script type="module">
    const ROOT = window.odooApp || (window.odooApp = {});
    const params = new URLSearchParams(window.location.search);
    const locale = (params.get("locale") || "en").toLowerCase().startsWith("es") ? "es" : "en";
    const base = "../../data/app_ui_unocss";

    const cssParts = [
      "css/00_core.css",
      "css/10_dashboard.css",
      "css/20_shell_layout.css",
      "css/21_sidebar.css",
      "css/22_topbar_profile.css",
      "css/23_breadcrumbs.css",
      "css/24_pane_header.css",
      "css/25_kpis.css",
      "css/26_portal_tabs.css",
      "css/27_datatable_shell.css",
      "css/28_overlays_popups.css",
      "css/31_shell_cards.css",
      "css/32_shell_menus.css",
      "css/33_shell_primitives.css",
      "css/34_command_palette.css",
      "css/35_shell_enrichment.css",
      "css/36_shell_insights.css",
      "css/37_shell_activity.css",
      "css/38_shell_dashboard.css",
      "css/39_shell_detail.css",
      "css/40_shell_execution.css",
      "css/20_tables.css",
      "css/30_forms.css",
    ];

    function setToolbar() {
      const next = (l) => `?locale=${l}`;
      const chips = [
        { label: "UnoCSS", href: next(locale), active: true },
        { label: locale === "es" ? "ES" : "EN", href: next(locale === "es" ? "en" : "es"), active: false },
      ];
      const host = document.getElementById("preview-toolbar");
      host.innerHTML = chips
        .map((chip) => `<a class="preview-chip ${chip.active ? 'active' : ''}" href="${chip.href}">${chip.label}</a>`)
        .join("");
    }

    function injectStyles() {
      cssParts.forEach((path) => {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = `${base}/${path}`;
        document.head.appendChild(link);
      });
    }

    async function loadScript(src) {
      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.async = false;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    async function loadRuntime() {
      await loadScript("https://cdn.jsdelivr.net/npm/@unocss/runtime/preset-wind3.global.js");
      await loadScript("https://cdn.jsdelivr.net/npm/@unocss/runtime/preset-attributify.global.js");
      await loadScript("https://cdn.jsdelivr.net/npm/@unocss/runtime/preset-typography.global.js");
      await loadScript(`${base}/js/unocss_runtime.js`);
      await loadScript("https://cdn.jsdelivr.net/npm/@unocss/runtime/core.global.js");

      const yamlRaw = await fetch(`${base}/i18n/messages.yml`, { cache: "no-store" }).then((r) => r.text());
      const i18nCatalog = window.jsyaml.load(yamlRaw) || {};
      ROOT.bootstrap = Object.assign({}, ROOT.bootstrap || {}, { i18nCatalog });
      ROOT.i18nCatalog = i18nCatalog;
      const inlineI18n = document.createElement("script");
      inlineI18n.textContent = `var __ODOO_BOOTSTRAP_I18N_CATALOG__ = ${JSON.stringify(i18nCatalog)};`;
      document.head.appendChild(inlineI18n);

      await loadScript(`${base}/app_ui_i18n.js`);
      await loadScript(`${base}/app_ui_config.js`);
      await loadScript(`${base}/js/app_ui_datatable_schema.js`);
      await loadScript(`${base}/js/app_ui_datatable_filters.js`);
      await loadScript(`${base}/js/app_ui_datatable_views.js`);
      await loadScript(`${base}/js/app_ui_shell_demo.js`);
      await loadScript(`${base}/js/app_ui_demo_data.js`);
      await loadScript(`${base}/js/app_ui_api.js`);
      await loadScript(`${base}/js/app_ui_state.js`);
    }

    async function mountPreview() {
      await loadRuntime();
      setToolbar();
      injectStyles();

      const i18nApi = ROOT.i18n;
      const demo = ROOT.demo;
      const stateApi = ROOT.state;

      if (!i18nApi || !demo || !stateApi) {
        throw new Error("Preview runtime modules were not loaded correctly.");
      }

      const t = i18nApi.createTranslator(ROOT.i18nCatalog, locale);
      const uiText = i18nApi.buildUiText(t);
      const state = stateApi.ensureVueState();

      state.i18n = uiText;
      const kpis = demo.buildKpis(uiText);
      state.kpis = { ...state.kpis, ...kpis };
      state.kpis.cards = kpis.cards || [];
      state.activeFilter = "all";
      state.tableQuery = "";
      state.tablePage = 1;
      state.tablePageSize = 10;
      state.tableRows = demo.getTableRows("all", "", uiText);
      state.notifications = demo.buildShellNotifications(uiText);
      state.profile = demo.buildShellProfile(uiText);
      state.workspaceCards = demo.buildWorkspaceCards(uiText);
      state.dashboardSections = demo.buildDashboardSections(uiText, state.tableRows);
      state.shellBrand = demo.buildShellBrand(uiText);
      state.focusRecordId = state.tableRows[0]?.id || null;
      state.counts = {
        all: demo.getTableRows("all", "", uiText).length,
        paid: demo.getTableRows("paid", "", uiText).length,
        overdue: demo.getTableRows("overdue", "", uiText).length,
        pending: demo.getTableRows("pending", "", uiText).length,
        draft: demo.getTableRows("draft", "", uiText).length,
      };

      const options = {
        moduleCache: { vue: Vue },
        getFile(url) {
          const normalized = String(url || "")
            .replace(/\\/g, "/")
            .replace(/^\.\//, "")
            .replace(/^\/+/, "");
          return fetch(`${base}/components/${normalized}`, { cache: "no-store" }).then((r) => r.text());
        },
        addStyle(textContent) {
          const style = document.createElement("style");
          style.textContent = textContent;
          document.head.appendChild(style);
        },
      };

      const { loadModule } = window["vue3-sfc-loader"];
      const resolveRows = () => {
        state.tableRows = demo.getTableRows(state.activeFilter, state.tableQuery, uiText);
      };

      const app = Vue.createApp({
        components: {
          Shell: Vue.defineAsyncComponent(() => loadModule("app/layout/Shell.vue", options)),
          CommandPalette: Vue.defineAsyncComponent(() => loadModule("app/workspace/CommandPalette.vue", options)),
        },
        setup() {
          const cpRef = Vue.ref(null);
          const apps = (ROOT.config?.navigation?.railApps || []).map((appItem) => ({
            ...appItem,
            label: uiText.navApps?.[appItem.labelKey] || appItem.labelKey,
            description: "Open module",
          }));

          const onFilter = (filterName) => {
            state.activeFilter = filterName;
            state.tablePage = 1;
            resolveRows();
          };
          const onSearch = (query) => {
            state.tableQuery = String(query || "");
            state.tablePage = 1;
            resolveRows();
          };
          const onNewRecord = () => alert("Preview mode: hook this action to Odoo create record");
          const openSpotlight = () => {
            if (cpRef.value && cpRef.value.open) cpRef.value.open();
          };

          return { state, apps, cpRef, onFilter, onSearch, onNewRecord, openSpotlight };
        },
        template: `
          <div>
            <Shell :state="state" :apps="apps" @set-filter="onFilter" @search="onSearch" @new-record="onNewRecord" @open-spotlight="openSpotlight" />
            <CommandPalette ref="cpRef" :i18n="state.i18n" :apps="apps" @new-record="onNewRecord" @filter-overdue="onFilter('overdue')" />
          </div>
        `,
      });

      document.body.classList.add("app-neural-active");
      app.mount("#preview-app");
    }

    mountPreview().catch((error) => {
      console.error(error);
      document.getElementById("preview-app").innerHTML = `<pre style="padding:1rem;color:#ff9aa9;">${String(error?.message || error)}</pre>`;
    });
  </script>
</body>

</html>
